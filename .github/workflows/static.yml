name: Build and Clean

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Go
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.23

      # Step 3: Build the application
      - name: Build application
        run: go build .

      # Step 4: Clean up the directory (cross-platform)
      - name: Clean up directory (Windows)
        if: runner.os == 'Windows'
        run: |
          Remove-Item -Path "statics" -Recurse -Force
          Remove-Item -Path ".github" -Recurse -Force
          Remove-Item -Path "main.go" -Force
          Remove-Item -Path "go.mod" -Force

      - name: Clean up directory (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          find . -maxdepth 1 ! -name 'em_webshare' ! -name '.' -exec rm -rf {} +

      # Step 5: Upload the artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: em_webshare-${{ matrix.os }}
          path: em_webshare
