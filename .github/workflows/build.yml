name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  build-desktop:
    name: Build Desktop - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build application
        run: go build -v -o em_webshare${{ runner.os == 'Windows' && '.exe' || '' }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: em_webshare-${{ matrix.os }}
          path: em_webshare${{ runner.os == 'Windows' && '.exe' || '' }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Build Android APK
        run: |
          $(go env GOPATH)/bin/fyne-cross android \
            -app-id com.electrotech.em_webshare \
            -icon core/icon.png \
            -name em_webshare \
            ./mobile

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: em_webshare-android
          path: fyne-cross/dist/android/*.apk

  release:
    name: Release
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/em_webshare-windows-latest/em_webshare.exe
            artifacts/em_webshare-ubuntu-latest/em_webshare
            artifacts/em_webshare-macos-latest/em_webshare
            artifacts/em_webshare-android/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
